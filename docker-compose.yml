version: "3.9"

services:
  # ─── PostgreSQL + TimescaleDB ────────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: trading_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-trading}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trading_secret}
      POSTGRES_DB: ${DB_NAME:-trading_bot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trading} -d ${DB_NAME:-trading_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: trading_redis
    restart: unless-stopped
    # volatile-lru: only evict keys that have a TTL set.
    # Critical trading state (auth tokens, kill switch, position state) must use
    # no TTL or a long TTL so they are never silently evicted under memory pressure.
    # Transient data (tick cache, signal cache) use short TTLs and are safe to evict.
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy volatile-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Commander (lightweight Redis GUI) ─────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: trading_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-redis_secret}"
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - tools   # only starts with: docker compose --profile tools up

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: trading_network
