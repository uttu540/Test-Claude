name: Improvement / Refactor
description: Enhance existing code — performance, reliability, security, or tech debt
title: "[Improvement]: "
labels: ["improvement", "priority: medium"]
body:
  - type: markdown
    attributes:
      value: |
        ## Improvement / Refactor
        Use this for code quality, performance, security hardening, or technical debt that isn't a new feature.

  - type: dropdown
    id: type
    attributes:
      label: Improvement Type
      options:
        - "Security — Fix vulnerability or harden code"
        - "Performance — Speed, memory, or resource usage"
        - "Reliability — Error handling, retries, resilience"
        - "Code Quality — Refactor, cleanup, naming"
        - "Technical Debt — Remove workaround or hack"
        - "Testing — Add or fix tests"
        - "Documentation — Docstrings, comments, README"
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Affected Phase
      options:
        - "Phase 1: Foundation"
        - "Phase 2: Intelligence"
        - "Phase 3: Strategy & Backtesting"
        - "Phase 4: Paper Trading"
        - "Phase 5: Semi-Automated Live Trading"
        - "Phase 6: Full Automation + Groww"
        - "Cross-cutting (all phases)"
    validations:
      required: true

  - type: input
    id: file
    attributes:
      label: File(s) / Line(s) Affected
      placeholder: "services/execution/zerodha/authenticator.py:89-134"
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current Behaviour / Problem
      description: What's wrong with the existing code?
      placeholder: |
        `browser.close()` is called at line 134 but not inside a try-finally block.
        If any exception occurs between lines 93–133, the browser process leaks.
    validations:
      required: true

  - type: textarea
    id: desired
    attributes:
      label: Desired Behaviour / Fix
      description: What should the improved code do?
      placeholder: |
        Wrap the entire browser session in a try-finally block so `browser.close()`
        is guaranteed to run even on exception. Or use `async with` context manager.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Browser process is always cleaned up on exception
        - [ ] No change to external behaviour (auth still works)
        - [ ] Existing tests still pass
    validations:
      required: true

  - type: checkboxes
    id: claude_ready
    attributes:
      label: Ready for Claude Code?
      options:
        - label: "Yes — add the `claude` label to trigger implementation"
